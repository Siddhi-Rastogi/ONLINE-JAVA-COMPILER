<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Java Compiler</title>
    <link rel="stylesheet" href="styles.css">
    <script src="Myscript.js"></script>
</head>
<body onload="document.getElementById('class').focus()">
    <main class="app-shell">
        <header class="app-header">
            <div>
                <p class="eyebrow">Java Servlet Application</p>
                <h1>Online Java Compiler</h1>
            </div>
        </header>

        <form name="form" class="compiler-form" onsubmit="return false;">
            <section class="field-row">
                <label for="class">Class Name</label>
                <input type="text" name="class" id="class" placeholder="Main" autocomplete="off" onblur="set()">
            </section>

            <section class="workspace">
                <div class="editor-panel">
                    <label for="code">Java Source Code</label>
                    <textarea placeholder="Your code will appear here" name="code" id="code" spellcheck="false"></textarea>
                </div>

                <div class="editor-panel">
                    <label for="code1">Output</label>
                    <textarea placeholder="Compiler errors and runtime output will appear here" name="code1" id="code1" readonly></textarea>
                </div>
            </section>

            <section class="actions" aria-label="Compiler actions">
                <input type="button" class="btn btn-primary" value="Compile" onclick="compile()">
                <input type="button" class="btn" value="Run" onclick="run()">
                <input type="button" class="btn btn-secondary" value="Reset" onclick="blank()">
            </section>
        </form>
    </main>
</body>
</html>
